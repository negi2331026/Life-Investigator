<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>生命调查局 - Life Investigator</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <!-- html2canvas CDN: 优先国内源，回退 unpkg -->
    <script>
      (function loadHtml2canvas() {
        var CDNS = [
          'https://cdn.bootcdn.net/ajax/libs/html2canvas/1.4.1/html2canvas.min.js',
          'https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js',
          'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js'
        ];
        function tryNext(i) {
          if (i >= CDNS.length) { console.error('[html2canvas] 所有 CDN 加载失败'); return; }
          var s = document.createElement('script');
          s.src = CDNS[i];
          s.onerror = function () { tryNext(i + 1); };
          s.onload = function () { console.log('[html2canvas] 加载成功: ' + CDNS[i]); };
          document.head.appendChild(s);
        }
        tryNext(0);
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
